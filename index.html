<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anastasia Nails Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #e19ea8; --gold: #d4a373; --dark: #0f0f0f; --glass: rgba(255, 255, 255, 0.07); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #2c1a1d 0%, #0f0f0f 80%); z-index: -1; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; color: var(--accent); margin: 0 0 20px; text-align: center; }

        /* Галерея */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .gallery-item { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }

        /* Услуги */
        .srv-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .srv-info b { display: block; font-size: 15px; color: #eee; }
        .srv-info span { font-size: 11px; color: var(--accent); opacity: 0.8; }

        /* Календарь */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 12px 0; border-radius: 12px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .day.selected { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--accent); }
        .day.disabled { opacity: 0.1; }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .t-slot { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .t-slot.active { border-color: var(--accent); background: rgba(225, 158, 168, 0.2); }

        /* Навигация */
        .nav { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 70px; background: rgba(20,20,20,0.85); backdrop-filter: blur(25px); border-radius: 25px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-btn { color: #666; font-size: 20px; transition: 0.4s; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-btn.active { color: var(--accent); transform: translateY(-5px); text-shadow: 0 0 10px var(--accent); }
        .nav-btn span { font-size: 9px; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .section { display: none; animation: slideUp 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 18px; color: #fff; outline: none; margin-bottom: 20px; box-sizing: border-box; }
        .btn-del { width: 100%; padding: 15px; background: rgba(255, 50, 50, 0.1); color: #ff5e5e; border: 1px solid #ff5e5e; border-radius: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        
        <div id="tab-gallery" class="section active">
            <h2>Галерея работ</h2>
            <div class="card">
                <div class="gallery-grid">
                    <img src="https://via.placeholder.com/300x300/e19ea8/ffffff?text=Work+1" class="gallery-item" alt="Работа">
                    <img src="https://via.placeholder.com/300x300/d4a373/ffffff?text=Work+2" class="gallery-item" alt="Работа">
                    <img src="https://via.placeholder.com/300x300/2c1a1d/ffffff?text=Work+3" class="gallery-item" alt="Работа">
                    <img src="https://via.placeholder.com/300x300/1a1a1a/ffffff?text=Work+4" class="gallery-item" alt="Работа">
                </div>
            </div>
        </div>

        <div id="tab-services" class="section">
            <h2>Прайс-лист</h2>
            <div class="card">
                <div class="srv-item">
                    <div class="srv-info"><b>Эстетика</b><span>Маникюр + Покрытие</span></div>
                    <div>1200₽</div>
                </div>
                <div class="srv-item">
                    <div class="srv-info"><b>Длина</b><span>Укрепление гелем</span></div>
                    <div>1700₽</div>
                </div>
                <div class="srv-item">
                    <div class="srv-info"><b>Дизайн</b><span>Сложная роспись</span></div>
                    <div>от 300₽</div>
                </div>
            </div>
        </div>

        <div id="tab-booking" class="section">
            <h2 id="book-head">Записаться</h2>
            <input type="text" id="userName" placeholder="Ваше имя">
            <div class="card">
                <div class="calendar-grid" id="cal"></div>
            </div>
            <div id="time-box" class="card" style="display:none">
                <div class="time-grid" id="times"></div>
            </div>
        </div>

        <div id="tab-profile" class="section">
            <h2>Моя запись</h2>
            <div class="card" id="no-booking">
                <p style="text-align: center; opacity: 0.5;">У вас пока нет активных записей</p>
            </div>
            <div class="card" id="has-booking" style="display: none;">
                <p id="visit-info" style="text-align: center; font-size: 18px; color: var(--accent);"></p>
                <button class="btn-del" onclick="deleteMyBooking()">Удалить запись</button>
                <p style="font-size: 10px; opacity: 0.4; text-align: center; margin-top: 15px;">Чтобы изменить время, просто запишитесь заново во вкладке Календарь</p>
            </div>
        </div>

    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="tab('tab-gallery', this)"><i class="fa-solid fa-images"></i><span>Галерея</span></div>
        <div class="nav-btn" onclick="tab('tab-services', this)"><i class="fa-solid fa-gem"></i><span>Прайс</span></div>
        <div class="nav-btn" onclick="tab('tab-booking', this)"><i class="fa-solid fa-calendar-alt"></i><span>Запись</span></div>
        <div class="nav-btn" onclick="tab('tab-profile', this)"><i class="fa-solid fa-user-check"></i><span>Визит</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0f0f0f';

        let state = { name: '', date: '', time: '', action: 'create' };
        let currMonth = new Date();

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'tab-booking') renderCal();
        }

        function renderCal() {
            const grid = document.getElementById('cal');
            grid.innerHTML = '';
            const days = new Date(currMonth.getFullYear(), currMonth.getMonth()+1, 0).getDate();
            for(let i=1; i<=days; i++) {
                const d = document.createElement('div');
                d.className = 'day'; d.innerText = i;
                d.onclick = () => {
                    document.querySelectorAll('.day').forEach(x => x.classList.remove('selected'));
                    d.classList.add('selected');
                    state.date = `${currMonth.getFullYear()}-${String(currMonth.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    document.getElementById('time-box').style.display = 'block';
                    renderTime();
                };
                grid.appendChild(d);
            }
        }

        function renderTime() {
            const grid = document.getElementById('times');
            grid.innerHTML = '';
            ["12:00", "14:00", "16:00", "18:00"].forEach(t => {
                const s = document.createElement('div');
                s.className = 't-slot'; s.innerText = t;
                s.onclick = () => {
                    const name = document.getElementById('userName').value;
                    if(!name) return alert("Введите имя");
                    state.name = name; state.time = t;
                    state.action = 'create';
                    tg.MainButton.setText("ПОДТВЕРДИТЬ").show();
                };
                grid.appendChild(s);
            });
        }

        function deleteMyBooking() {
            state.action = 'delete';
            tg.MainButton.setText("УДАЛИТЬ ЗАПИСЬ").show();
            tg.MainButton.color = "#ff3b30";
        }

        tg.MainButton.onClick(() => tg.sendData(JSON.stringify(state)));
    </script>
</body>
</html>
