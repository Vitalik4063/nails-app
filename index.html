<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nastasia_Nailss Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ffafbd; --glass: rgba(255, 255, 255, 0.1); --bg: #0d0d0d; --gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .brand { text-align: center; font-family: 'Georgia', serif; font-size: 24px; color: var(--accent); margin: 15px 0; }
        
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 15px; }

        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--gradient); color: #000; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; text-decoration: none; }
        .btn-call { background: #28a745; color: white; }
        .btn-chat { background: #0088cc; color: white; padding: 6px 12px; font-size: 11px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 10px 0; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; }
        .day.disabled { opacity: 0.2; pointer-events: none; text-decoration: line-through; }
        .day.selected { background: var(--gradient); color: #000; font-weight: bold; }

        .nav { position: fixed; bottom: 10px; left: 5%; width: 90%; height: 65px; background: rgba(15,15,15,0.98); border-radius: 18px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 9px; flex: 1; }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--accent); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 8px; box-sizing: border-box; }
        .admin-item { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">NASTASIA_NAILSS</div>

        <div id="sec-style" class="section active">
            <div class="glass">
                <div style="width:100%; height:130px; border-radius:15px; background: url('https://static-maps.yandex.ru/1.x/?ll=43.231604,50.067513&z=17&l=map&size=450,150&pt=43.231604,50.067513,pm2rdm') center/cover; margin-bottom:12px;"></div>
                <p style="font-size:13px;">📍 Михайловка, Республиканская, 71. 2 этаж.</p>
                <a href="tel:+79023611937" class="btn-main btn-call"><i class="fa-solid fa-phone"></i> ПОЗВОНИТЬ</a>
            </div>
        </div>

        <div id="sec-port" class="section">
            <div class="glass">
                <h3>Отзывы ✨</h3>
                <div id="user-reviews"></div>
                <input id="rev-n" placeholder="Имя">
                <textarea id="rev-t" placeholder="Отзыв..."></textarea>
                <button class="btn-main" onclick="addRev()">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div id="sec-book" class="section">
            <div class="glass">
                <h3 style="text-align:center;">Март 2026</h3>
                <div class="cal-grid" id="cal"></div>
            </div>
            <div id="time-box" class="glass" style="display:none">
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px" id="times"></div>
            </div>
        </div>

        <div id="sec-admin" class="section">
            <div id="admin-auth" class="glass">
                <input type="password" id="adm-pass" placeholder="Пароль">
                <button class="btn-main" onclick="auth()">ВОЙТИ</button>
            </div>
            <div id="admin-panel" style="display:none">
                <div class="glass">
                    <h4 style="color:var(--accent)">ЖУРНАЛ ЗАПИСЕЙ</h4>
                    <div id="adm-books"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('sec-style', this)"><i class="fa-solid fa-house"></i><span>Стиль</span></div>
        <div class="nav-item" onclick="tab('sec-port', this)"><i class="fa-solid fa-heart"></i><span>Отзывы</span></div>
        <div class="nav-item" onclick="tab('sec-book', this)"><i class="fa-solid fa-calendar-alt"></i><span>Визит</span></div>
        <div class="nav-item" onclick="tab('sec-admin', this)"><i class="fa-solid fa-user-shield"></i><span>Админ</span></div>
    </nav>

<script>
    const tg = window.Telegram.WebApp;
    let reviews = JSON.parse(localStorage.getItem('nn_revs_v4')) || [];
    let bookings = JSON.parse(localStorage.getItem('nn_books_v4')) || [];

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(id === 'sec-book') renderCal();
        if(id === 'sec-admin') renderAdmin();
    }

    // ЗАПИСЬ
    function renderCal() {
        const c = document.getElementById('cal'); c.innerHTML = '';
        const today = new Date().getDate();
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day' + (i < today ? ' disabled' : '');
            d.innerText = i;
            d.onclick = () => {
                document.querySelectorAll('.day').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
                document.getElementById('time-box').style.display = 'block';
                renderTimes(i);
            };
            c.appendChild(d);
        }
    }

    function renderTimes(day) {
        const tDiv = document.getElementById('times'); tDiv.innerHTML = '';
        ["12:00","14:00","16:00","18:00"].forEach(t => {
            const b = document.createElement('div');
            b.className = 'day'; b.style.border = '1px solid #333'; b.innerText = t;
            b.onclick = () => {
                const user = tg.initDataUnsafe.user;
                const book = {
                    id: Date.now(), 
                    day: day, 
                    time: t, 
                    name: user?.first_name || 'Гость', 
                    username: user?.username || '' 
                };
                bookings.push(book);
                localStorage.setItem('nn_books_v4', JSON.stringify(bookings));
                tg.sendData(JSON.stringify({type: 'booking', data: book}));
                tg.showAlert(`Готово! Жду Вас ${day}.03 в ${t}`);
            };
            tDiv.appendChild(b);
        });
    }

    // АДМИНКА
    function auth() {
        if(document.getElementById('adm-pass').value === '7777') {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            renderAdmin();
        }
    }

    function renderAdmin() {
        document.getElementById('adm-books').innerHTML = bookings.map(b => `
            <div class="admin-item">
                <div style="margin-bottom:8px">
                    <b>${b.day}.03 | ${b.time}</b> — ${b.name}
                </div>
                <div style="display:flex; gap:10px; align-items:center">
                    ${b.username ? 
                        `<a href="https://t.me/${b.username}" target="_blank" class="btn-chat">
                            <i class="fa-brands fa-telegram"></i> НАПИСАТЬ
                         </a>` : 
                        `<span style="font-size:10px; opacity:0.5">Личка скрыта</span>`
                    }
                    <i class="fa-solid fa-trash" style="color:red; margin-left:auto" onclick="delBook(${b.id})"></i>
                </div>
            </div>
        `).join('');
    }

    window.delBook = (id) => {
        bookings = bookings.filter(x => x.id !== id);
        localStorage.setItem('nn_books_v4', JSON.stringify(bookings));
        renderAdmin();
    };

    function addRev() { /* Логика отзывов остается прежней */ }
</script>
</body>
</html>
