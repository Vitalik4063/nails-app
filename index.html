<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nastasia_Nailss App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ffafbd; --glass: rgba(15, 15, 15, 0.95); --gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #000 url('https://images.unsplash.com/photo-1610992015762-43d047385960?q=80&w=1974') no-repeat center center fixed; background-size: cover; color: #fff; margin: 0; padding-bottom: 110px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        .style-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scroll-snap-type: x mandatory; }
        .style-card { flex: 0 0 85%; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; scroll-snap-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .style-card img { width: 100%; height: 230px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #222; }
        .btn-main { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--gradient); color: #000; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .btn-danger { background: #ff4d4d; color: #fff; }
        .nav { position: fixed; bottom: 15px; left: 3%; width: 94%; height: 70px; background: rgba(0,0,0,0.95); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 9px; flex: 1; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--accent); }
        .section { display: none; }
        .section.active { display: block; }
        input, textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; margin-bottom: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { padding: 12px 0; border-radius: 12px; cursor: pointer; text-align: center; background: rgba(255,255,255,0.05); }
        .day.selected { background: var(--gradient); color: #000; }
        .day.disabled { opacity: 0.1; pointer-events: none; }
        .time-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .time-slot { padding: 14px; border-radius: 15px; background: rgba(255,255,255,0.03); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .time-slot.selected { background: var(--gradient); color: #000; }
        #reg-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 3000; display: none; align-items: center; justify-content: center; }
        #reg-screen.active { display: flex; }
    </style>
</head>
<body>

<div id="reg-screen">
    <div class="glass" style="width: 85%;">
        <h3 style="text-align:center; color:var(--accent);">РЕГИСТРАЦИЯ</h3>
        <input id="reg-fn" placeholder="Имя">
        <input id="reg-ph" type="tel" value="+7">
        <button class="btn-main" onclick="saveUser()">ВОЙТИ</button>
    </div>
</div>

<div class="container">
    <div id="sec-style" class="section active">
        <div class="style-scroll">
            <div class="style-card">
                <img src="https://images.unsplash.com/photo-1632345031435-8727f6897d53?w=600">
                <h4>Миндаль</h4>
            </div>
            <div class="style-card">
                <img src="https://images.unsplash.com/photo-1604654894610-df490651e10c?w=600">
                <h4>Мягкий Квадрат</h4>
            </div>
        </div>
    </div>

    <div id="sec-book" class="section">
        <div id="my-booking-status" style="display:none;" class="glass">
            <p id="my-book-text"></p>
            <button class="btn-main" onclick="startEdit()">ИЗМЕНИТЬ</button>
            <button class="btn-main btn-danger" onclick="cancelBooking()">ОТМЕНИТЬ</button>
        </div>
        <div id="booking-ui">
            <div class="glass"><div class="cal-grid" id="cal"></div></div>
            <div id="time-box" class="glass" style="display:none">
                <div class="time-grid" id="times"></div>
                <button id="confirm-btn" class="btn-main" style="display:none" onclick="confirmBooking()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <div id="sec-revs" class="section">
        <div class="glass">
            <textarea id="rev-text" placeholder="Твой отзыв..."></textarea>
            <button class="btn-main" onclick="postReview()">ОТПРАВИТЬ</button>
        </div>
        <div id="list-reviews"></div>
    </div>

    <div id="sec-admin" class="section">
        <div id="adm-login" class="glass">
            <input type="password" id="adm-pass" placeholder="Пароль">
            <button class="btn-main" onclick="checkAdm()">ВОЙТИ</button>
        </div>
        <div id="adm-panel" style="display:none">
            <div id="adm-books-list"></div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('sec-style', this)"><i class="fa-solid fa-palette"></i></div>
    <div class="nav-item" onclick="tab('sec-book', this)"><i class="fa-solid fa-calendar"></i></div>
    <div class="nav-item" onclick="tab('sec-revs', this)"><i class="fa-solid fa-star"></i></div>
    <div class="nav-item" onclick="tab('sec-admin', this)"><i class="fa-solid fa-lock"></i></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_IDS = [12345678, 87654321]; // СЮДА СВОИ ID
    let selectedDay = null, selectedTime = null, editId = null;
    let bookings = JSON.parse(localStorage.getItem('nn_v5_books')) || [];
    let reviews = JSON.parse(localStorage.getItem('nn_v5_revs')) || [];
    let user = JSON.parse(localStorage.getItem('nn_v5_user'));

    if(!user) document.getElementById('reg-screen').classList.add('active');

    function sendSignal(action, data) {
        tg.sendData(JSON.stringify({ event: action, payload: data }));
    }

    function saveUser() {
        const fn = document.getElementById('reg-fn').value;
        const ph = document.getElementById('reg-ph').value;
        if(fn && ph.length > 10) {
            user = { fn, ph, id: tg.initDataUnsafe.user?.id };
            localStorage.setItem('nn_v5_user', JSON.stringify(user));
            document.getElementById('reg-screen').classList.remove('active');
            sendSignal('registration', user);
        }
    }

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        if(id === 'sec-book') renderBookingState();
        if(id === 'sec-admin') renderAdmin();
    }

    function renderBookingState() {
        const myBook = bookings.find(b => b.user.ph === user.ph);
        if(myBook && !editId) {
            document.getElementById('my-booking-status').style.display = 'block';
            document.getElementById('booking-ui').style.display = 'none';
            document.getElementById('my-book-text').innerText = `Запись: ${myBook.day} марта, ${myBook.time}`;
        } else {
            document.getElementById('my-booking-status').style.display = 'none';
            document.getElementById('booking-ui').style.display = 'block';
            renderCal();
        }
    }

    function renderCal() {
        const c = document.getElementById('cal'); c.innerHTML = '';
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day' + (i === selectedDay ? ' selected' : '');
            d.innerText = i;
            d.onclick = () => { selectedDay = i; renderCal(); document.getElementById('time-box').style.display='block'; renderTimes(i); };
            c.appendChild(d);
        }
    }

    function renderTimes(day) {
        const tDiv = document.getElementById('times'); tDiv.innerHTML = '';
        const slots = ["12:00","14:00","16:00","18:00"];
        slots.forEach(t => {
            const s = document.createElement('div');
            s.className = 'time-slot' + (t === selectedTime ? ' selected' : '');
            s.innerText = t;
            s.onclick = () => { selectedTime = t; renderTimes(day); document.getElementById('confirm-btn').style.display='block'; };
            tDiv.appendChild(s);
        });
    }

    function confirmBooking() {
        if(editId) {
            const idx = bookings.findIndex(b => b.id === editId);
            bookings[idx].day = selectedDay; bookings[idx].time = selectedTime;
            sendSignal('edit_booking', bookings[idx]);
            editId = null;
        } else {
            const b = { id: Date.now().toString(), day: selectedDay, time: selectedTime, user };
            bookings.push(b);
            sendSignal('new_booking', b);
        }
        localStorage.setItem('nn_v5_books', JSON.stringify(bookings));
        renderBookingState();
    }

    function startEdit() { editId = bookings.find(b => b.user.ph === user.ph)?.id; renderBookingState(); }

    function cancelBooking() {
        const b = bookings.find(x => x.id === (editId || bookings.find(b => b.user.ph === user.ph)?.id));
        if(confirm("Отменить?")) {
            sendSignal('cancel_booking', b);
            bookings = bookings.filter(x => x.id !== b.id);
            localStorage.setItem('nn_v5_books', JSON.stringify(bookings));
            renderBookingState();
        }
    }

    function postReview() {
        const txt = document.getElementById('rev-text').value;
        if(!txt) return;
        const r = { user, text: txt };
        reviews.unshift(r);
        localStorage.setItem('nn_v5_revs', JSON.stringify(reviews));
        sendSignal('new_review', r);
        renderRevs();
    }

    function renderRevs() {
        document.getElementById('list-reviews').innerHTML = reviews.map(r => `<div class="glass"><b>${r.user.fn}</b>: ${r.text}</div>`).join('');
    }

    function checkAdm() {
        if(document.getElementById('adm-pass').value === '7777' || ADMIN_IDS.includes(tg.initDataUnsafe.user?.id)) {
            document.getElementById('adm-login').style.display = 'none';
            document.getElementById('adm-panel').style.display = 'block';
        }
    }

    function renderAdmin() {
        document.getElementById('adm-books-list').innerHTML = bookings.map(b => `<div class="glass">${b.day}.03 | ${b.time} - ${b.user.fn}</div>`).join('');
    }
</script>
</body>
</html>
