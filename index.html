<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anastasia Nails Luxe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffafbd; --secondary: #ffc3a0; --accent: #e19ea8; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Анимированный фон */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #1a0f10, #0a0a0a, #161011); z-index: -1; }
        .bg-glow { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(120px); opacity: 0.15; border-radius: 50%; animation: move 10s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 50%); } }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .section { display: none; animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Красивые карточки */
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 25px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* Регистрация */
        .reg-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; outline: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .reg-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(225, 158, 168, 0.3); }
        .main-btn { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; font-weight: bold; font-size: 16px; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }

        /* Галерея */
        .gal-card { margin-bottom: 25px; border-radius: 25px; overflow: hidden; background: var(--glass); border: 1px solid rgba(255,255,255,0.05); }
        .gal-img { width: 100%; height: 250px; object-fit: cover; }
        .gal-desc { padding: 15px; font-size: 14px; color: #ccc; line-height: 1.4; }
        .gal-desc b { color: var(--accent); display: block; margin-bottom: 5px; }

        /* Календарь */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { padding: 12px 0; border-radius: 12px; font-size: 13px; cursor: pointer; border: 1px solid transparent; }
        .day.today { border-color: var(--accent); color: var(--accent); }
        .day.selected { background: var(--accent); color: #000; font-weight: bold; }
        .day.disabled { opacity: 0.1; cursor: not-allowed; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 75px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.08); z-index: 1000; }
        .nav-item { color: #555; font-size: 22px; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }
        .nav-item span { font-size: 10px; margin-top: 5px; opacity: 0; transition: 0.3s; }
        .nav-item.active span { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-animate"><div class="bg-glow"></div></div>
    
    <div class="container">
        <div id="section-reg" class="section">
            <h1 style="text-align: center; font-weight: 300; letter-spacing: 5px;">WELCOME</h1>
            <p style="text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 30px;">Зарегистрируйтесь, чтобы продолжить</p>
            <div class="glass-card">
                <input type="text" id="regName" class="reg-input" placeholder="Ваше Имя">
                <input type="tel" id="regPhone" class="reg-input" placeholder="+7 (___) ___-__-__">
                <button class="main-btn" onclick="finishReg()">ВОЙТИ</button>
            </div>
        </div>

        <div id="section-gallery" class="section">
            <h2>Portfolio</h2>
            <div class="gal-card">
                <img src="https://images.unsplash.com/photo-1632345031435-8727f6897d53?auto=format&fit=crop&w=500" class="gal-img">
                <div class="gal-desc"><b>Элегантный нюд</b>Классическое покрытие с выравниванием. Идеально для офиса и повседневной жизни.</div>
            </div>
            <div class="gal-card">
                <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=500" class="gal-img">
                <div class="gal-desc"><b>Вечерний френч</b>Стильный французский маникюр с добавлением золотых элементов.</div>
            </div>
        </div>

        <div id="section-book" class="section">
            <h2>Appointment</h2>
            <div class="glass-card">
                <div class="cal-grid" id="calendar"></div>
            </div>
            <div id="time-grid" class="glass-card" style="display:none">
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;" id="time-slots"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar" id="main-nav" style="display:none">
        <div class="nav-item active" onclick="showTab('section-gallery', this)"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Работы</span></div>
        <div class="nav-item" onclick="showTab('section-book', this)"><i class="fa-solid fa-calendar-alt"></i><span>Запись</span></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#0a0a0a';

    let appState = { name: '', phone: '', date: '', time: '' };
    const today = new Date(); today.setHours(0,0,0,0);

    // Логика входа
    function checkAuth() {
        const saved = localStorage.getItem('nails_user');
        if (saved) {
            appState = JSON.parse(saved);
            showTab('section-gallery');
            document.getElementById('main-nav').style.display = 'flex';
        } else {
            document.getElementById('section-reg').classList.add('active');
        }
    }

    function finishReg() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        if(name.length < 2 || phone.length < 10) return alert("Заполните данные");
        appState.name = name; appState.phone = phone;
        localStorage.setItem('nails_user', JSON.stringify(appState));
        location.reload();
    }

    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        if(id === 'section-book') renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        const date = new Date();
        const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
        
        for(let i = 1; i <= daysInMonth; i++) {
            const d = new Date(date.getFullYear(), date.getMonth(), i);
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = i;
            if(d.getTime() === today.getTime()) el.classList.add('today');
            if(d < today) el.classList.add('disabled');
            else {
                el.onclick = () => {
                    document.querySelectorAll('.day').forEach(x => x.classList.remove('selected'));
                    el.classList.add('selected');
                    appState.date = d.toISOString().split('T')[0];
                    renderTime();
                };
            }
            grid.appendChild(el);
        }
    }

    function renderTime() {
        document.getElementById('time-grid').style.display = 'block';
        const slots = ["12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];
        const grid = document.getElementById('time-slots');
        grid.innerHTML = '';
        slots.forEach(t => {
            const btn = document.createElement('div');
            btn.className = 'reg-input'; btn.style.textAlign = 'center'; btn.innerText = t;
            btn.onclick = () => {
                appState.time = t;
                tg.MainButton.setText(`ЗАПИСАТЬСЯ НА ${t}`).show();
            };
            grid.appendChild(btn);
        });
    }

    tg.MainButton.onClick(() => tg.sendData(JSON.stringify(appState)));
    checkAuth();
</script>
</body>
</html>
