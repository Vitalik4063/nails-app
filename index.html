<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nastasia_Nailss ✨</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ffafbd; --glass: rgba(255, 255, 255, 0.08); --bg: #0d0d0d; --gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 110px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 20px; margin-bottom: 20px; }
        
        .brand { text-align: center; font-family: 'Georgia', serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); margin: 10px 0; }
        
        /* Статистика и База */
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; font-size: 13px; }
        .client-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .history-tag { font-size: 10px; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 5px; margin-left: 5px; }

        /* Навигация */
        .nav { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 75px; background: rgba(15,15,15,0.95); backdrop-filter: blur(30px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #444; text-align: center; transition: 0.4s; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-main { width: 100%; padding: 15px; border-radius: 18px; border: none; background: var(--gradient); color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">Nastasia_Nailss</div>

        <div id="sec-gallery" class="section active">
            <div class="glass">
                <img src="https://images.unsplash.com/photo-1632345031435-8727f6897d53?w=500" style="width:100%; border-radius:20px;">
                <button class="btn-main" onclick="tab('sec-book')">ЗАПИСАТЬСЯ ✨</button>
            </div>
        </div>

        <div id="sec-book" class="section">
            <div class="glass" id="calendar"></div>
            <div id="time-box" class="glass" style="display:none">
                <div id="times" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
                <textarea id="wishes" placeholder="Твои пожелания... 🌸" style="width:100%; margin-top:10px; background:none; border:1px solid #333; color:#fff; border-radius:10px; padding:10px;"></textarea>
            </div>
        </div>

        <div id="sec-admin" class="section">
            <div id="admin-auth" class="glass">
                <input type="password" id="adminPass" placeholder="Код доступа">
                <button class="btn-main" onclick="authAdmin()">ВОЙТИ</button>
            </div>
            <div id="admin-panel" style="display:none">
                <div class="glass">
                    <h3>Прибыль 💰</h3>
                    <input type="number" id="incAmt" placeholder="Сумма (₽)">
                    <button class="btn-main" onclick="addIncome()">ДОБАВИТЬ</button>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;" id="stats">
                        <div class="stat-card">Месяц: <b id="m-stat">0₽</b></div>
                        <div class="stat-card">Год: <b id="y-stat">0₽</b></div>
                    </div>
                </div>
                <div class="glass">
                    <h3>База клиентов 👤</h3>
                    <div id="client-list" style="max-height: 300px; overflow-y: auto;">
                        <p style="font-size: 12px; opacity: 0.5;">Загрузка списка из бота...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('sec-gallery', this)"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <div class="nav-item" onclick="tab('sec-book', this)"><i class="fa-solid fa-calendar-alt"></i></div>
        <div class="nav-item" onclick="tab('sec-admin', this)"><i class="fa-solid fa-crown"></i></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    let state = { name: 'Клиент', date: '', time: '', wishes: '', action: 'record' };
    let profit = JSON.parse(localStorage.getItem('p_data')) || [];

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        if(id === 'sec-book') renderCal();
    }

    function authAdmin() {
        if(document.getElementById('adminPass').value === "7777") {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            // Запрашиваем данные у бота
            tg.sendData(JSON.stringify({action: "get_clients"}));
        }
    }

    // Эта функция будет вызываться, когда бот пришлет список (через showAlert для примера или просто имитация)
    // В реальном Telegram WebApp данные передаются через bot.answerWebAppQuery
    
    function addIncome() {
        const val = parseFloat(document.getElementById('incAmt').value);
        if(val) {
            profit.push({v: val, d: new Date().toISOString()});
            localStorage.setItem('p_data', JSON.stringify(profit));
            updateStats();
            document.getElementById('incAmt').value = '';
        }
    }

    function updateStats() {
        const total = profit.reduce((a, b) => a + b.v, 0);
        document.getElementById('m-stat').innerText = total + '₽';
        document.getElementById('y-stat').innerText = total + '₽';
    }

    function renderCal() {
        const grid = document.getElementById('calendar'); grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            const d = document.createElement('div'); d.innerText = i;
            d.style.padding = '10px'; d.onclick = () => {
                state.date = 'Марта ' + i;
                document.getElementById('time-box').style.display = 'block';
                renderTime();
            };
            grid.appendChild(d);
        }
    }

    function renderTime() {
        const grid = document.getElementById('times'); grid.innerHTML = '';
        ["12:00", "15:00", "18:00"].forEach(t => {
            const b = document.createElement('div'); b.innerText = t; b.className = 'stat-card';
            b.onclick = () => {
                state.time = t;
                state.wishes = document.getElementById('wishes').value;
                tg.MainButton.setText("ЗАПИСАТЬСЯ ✨").show();
            };
            grid.appendChild(b);
        });
    }

    tg.MainButton.onClick(() => tg.sendData(JSON.stringify(state)));
</script>
</body>
</html>
