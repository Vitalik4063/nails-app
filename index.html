<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nastasia_Nailss</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ffafbd; --glass: rgba(15, 15, 15, 0.98); --gradient: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .glass { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* КАРТИНКИ ГИДА */
        .style-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
        .style-card { flex: 0 0 70%; background: #111; border-radius: 15px; padding: 10px; }
        .style-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        
        /* КНОПКИ */
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--gradient); color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-vk { background: #4C75A3; color: white; }
        .btn-tg { background: #229ED9; color: white; }

        /* ОТЗЫВЫ */
        .star-rating { color: #ffd700; margin-bottom: 10px; font-size: 20px; }
        .star-rating i { cursor: pointer; }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 10px; left: 5%; width: 90%; height: 65px; background: #111; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #333; z-index: 1000; }
        .nav-item { color: #555; text-align: center; flex: 1; font-size: 10px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; }

        /* СЕКЦИИ */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* КАЛЕНДАРЬ */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { padding: 10px 0; text-align: center; border-radius: 10px; background: #222; cursor: pointer; }
        .day.selected { background: var(--accent); color: #000; font-weight: bold; }
        .day.disabled { opacity: 0.2; pointer-events: none; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .time-slot { padding: 12px; border-radius: 10px; background: #222; text-align: center; }
        .time-slot.occupied { opacity: 0.3; text-decoration: line-through; pointer-events: none; }
        .time-slot.selected { background: #2ecc71; color: #fff; }

        /* РЕГИСТРАЦИЯ */
        #reg-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        #reg-screen.active { display: flex; }
        input, textarea { width: 100%; padding: 15px; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; margin-bottom: 10px; }

        /* МОДАЛКА УСПЕХА */
        #success-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="reg-screen">
    <div class="glass" style="width: 100%;">
        <h3 style="text-align:center; color:var(--accent)">РЕГИСТРАЦИЯ</h3>
        <input id="reg-fn" placeholder="Имя">
        <input id="reg-ln" placeholder="Фамилия">
        <input id="reg-ph" type="tel" value="+7" oninput="if(!this.value.startsWith('+7'))this.value='+7'">
        <button class="btn-main" onclick="saveUser()">ПОДТВЕРДИТЬ</button>
    </div>
</div>

<div id="success-modal">
    <div class="glass">
        <div style="font-size: 60px;">💅✨</div>
        <h2 style="color:var(--accent)">ПОЗДРАВЛЯЕМ!</h2>
        <p id="success-msg"></p>
        <button class="btn-main" onclick="closeSuccess()">ОТЛИЧНО!</button>
    </div>
</div>

<div class="container">
    <div id="sec-style" class="section active">
        <h3 style="color:var(--accent)">ГИД ПО ФОРМАМ</h3>
        <div class="style-scroll">
            <div class="style-card"><img src="https://images.unsplash.com/photo-1632345031435-8727f6897d53?w=400"><h4>Миндаль</h4></div>
            <div class="style-card"><img src="https://images.unsplash.com/photo-1604654894610-df490651e10c?w=400"><h4>Квадрат</h4></div>
            <div class="style-card"><img src="https://images.unsplash.com/photo-1519014816548-bf5fe059798b?w=400"><h4>Стилет</h4></div>
        </div>
        
        <h3 style="color:var(--accent); margin-top:20px;">МОИ СОЦСЕТИ</h3>
        <a href="https://vk.com/nastasia_nails0" class="btn btn-vk"><i class="fa-brands fa-vk"></i> Группа ВК</a>
        <a href="https://t.me/nailsnastasiakireeva" class="btn btn-tg"><i class="fa-brands fa-telegram"></i> Мой Канал</a>
    </div>

    <div id="sec-book" class="section">
        <div id="my-book-status" class="glass" style="display:none">
            <h4 style="color:var(--accent)">Ваша запись:</h4>
            <p id="status-text" style="font-size:18px; font-weight:bold"></p>
            <div style="display:flex; gap:10px">
                <button class="btn-main" style="background:#f39c12" onclick="editMyBook()">ИЗМЕНИТЬ</button>
                <button class="btn-main" style="background:#e74c3c; color:white" onclick="cancelMyBook()">ОТМЕНИТЬ</button>
            </div>
        </div>

        <div id="booking-ui">
            <div class="glass">
                <h4>ВЫБЕРИТЕ ДАТУ (МАРТ)</h4>
                <div class="cal-grid" id="cal"></div>
            </div>
            <div id="time-box" class="glass" style="display:none">
                <h4>ДОСТУПНОЕ ВРЕМЯ (12:00-19:00)</h4>
                <div class="time-grid" id="times"></div>
                <button class="btn-main" id="confirm-btn" style="margin-top:20px; display:none" onclick="confirmBooking()">ЗАПИСАТЬСЯ ✅</button>
            </div>
        </div>
    </div>

    <div id="sec-revs" class="section">
        <div class="glass">
            <h4>ОСТАВИТЬ ОТЗЫВ</h4>
            <div class="star-rating" id="star-input">
                <i class="fa-star fa-solid" data-v="1"></i>
                <i class="fa-star fa-solid" data-v="2"></i>
                <i class="fa-star fa-solid" data-v="3"></i>
                <i class="fa-star fa-solid" data-v="4"></i>
                <i class="fa-star fa-solid" data-v="5"></i>
            </div>
            <textarea id="rev-msg" placeholder="Ваш комментарий..."></textarea>
            <button class="btn-main" onclick="sendReview()">ОТПРАВИТЬ ✨</button>
        </div>
        <div id="reviews-list"></div>
    </div>

    <div id="sec-admin" class="section">
        <div class="glass">
            <h3 style="color:var(--accent)">УПРАВЛЕНИЕ</h3>
            <div id="admin-books"></div>
            <hr style="opacity:0.1; margin:20px 0">
            <div id="admin-revs"></div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('sec-style', this)"><i class="fa-solid fa-house"></i>Главная</div>
    <div class="nav-item" onclick="tab('sec-book', this)"><i class="fa-solid fa-calendar-check"></i>Запись</div>
    <div class="nav-item" onclick="tab('sec-revs', this)"><i class="fa-solid fa-star"></i>Отзывы</div>
    <div class="nav-item" id="nav-admin" style="display:none" onclick="tab('sec-admin', this)"><i class="fa-solid fa-user-shield"></i>Админ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const MY_ID = 5742846099; // Твой ID
    
    let user = JSON.parse(localStorage.getItem('nn_user_v5'));
    let bookings = JSON.parse(localStorage.getItem('nn_books_v5')) || [];
    let reviews = JSON.parse(localStorage.getItem('nn_revs_v5')) || [];
    let selDay = null, selTime = null, rating = 5, editId = null;

    if(!user) document.getElementById('reg-screen').classList.add('active');
    if(tg.initDataUnsafe.user?.id === MY_ID) document.getElementById('nav-admin').style.display='block';

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'sec-book') renderBooking();
        if(id === 'sec-revs') renderReviews();
        if(id === 'sec-admin') renderAdmin();
    }

    function saveUser() {
        const fn = document.getElementById('reg-fn').value, ln = document.getElementById('reg-ln').value, ph = document.getElementById('reg-ph').value;
        if(fn && ph.length > 10) {
            user = {fn, ln, ph};
            localStorage.setItem('nn_user_v5', JSON.stringify(user));
            document.getElementById('reg-screen').classList.remove('active');
            tg.sendData(JSON.stringify({event: 'registration', payload: user}));
        }
    }

    function renderBooking() {
        const my = bookings.find(b => b.u === user.ph);
        if(my && !editId) {
            document.getElementById('my-book-status').style.display = 'block';
            document.getElementById('booking-ui').style.display = 'none';
            document.getElementById('status-text').innerText = `${my.day} марта в ${my.time}`;
        } else {
            document.getElementById('my-book-status').style.display = 'none';
            document.getElementById('booking-ui').style.display = 'block';
            renderCal();
        }
    }

    function renderCal() {
        const cal = document.getElementById('cal'); cal.innerHTML = '';
        const today = new Date().getDate();
        for(let i=1; i<=31; i++) {
            const d = document.createElement('div');
            d.className = 'day' + (i < today ? ' disabled' : '') + (i === selDay ? ' selected' : '');
            d.innerText = i;
            d.onclick = () => { selDay = i; renderCal(); document.getElementById('time-box').style.display='block'; renderTimes(); };
            cal.appendChild(d);
        }
    }

    function renderTimes() {
        const box = document.getElementById('times'); box.innerHTML = '';
        const slots = ['12:00','13:30','15:00','16:30','18:00'];
        const occupied = bookings.filter(b => b.day === selDay && b.id !== editId).map(b => b.time);
        
        slots.forEach(s => {
            const t = document.createElement('div');
            const isOcc = occupied.includes(s);
            t.className = 'time-slot' + (isOcc ? ' occupied' : '') + (s === selTime ? ' selected' : '');
            t.innerText = s;
            if(!isOcc) t.onclick = () => { selTime = s; renderTimes(); document.getElementById('confirm-btn').style.display='block'; };
            box.appendChild(t);
        });
    }

    function confirmBooking() {
        const bData = { id: editId || Date.now(), day: selDay, time: selTime, u: user.ph, fn: user.fn, ln: user.ln, ph: user.ph };
        if(editId) {
            bookings = bookings.map(b => b.id === editId ? bData : b);
            tg.sendData(JSON.stringify({event: 'edit_booking', payload: bData}));
        } else {
            bookings.push(bData);
            tg.sendData(JSON.stringify({event: 'new_booking', payload: bData}));
        }
        localStorage.setItem('nn_books_v5', JSON.stringify(bookings));
        document.getElementById('success-msg').innerText = `Вы записаны на ${selDay} марта в ${selTime}. Ждем вас!`;
        document.getElementById('success-modal').style.display = 'flex';
        editId = null;
    }

    function cancelMyBook() {
        const my = bookings.find(b => b.u === user.ph);
        if(confirm("Отменить запись?")) {
            bookings = bookings.filter(b => b.u !== user.ph);
            localStorage.setItem('nn_books_v5', JSON.stringify(bookings));
            tg.sendData(JSON.stringify({event: 'cancel_booking', payload: my}));
            renderBooking();
        }
    }

    function editMyBook() {
        const my = bookings.find(b => b.u === user.ph);
        editId = my.id;
        selDay = my.day;
        selTime = my.time;
        renderBooking();
    }

    function closeSuccess() {
        document.getElementById('success-modal').style.display = 'none';
        tab('sec-book', document.querySelectorAll('.nav-item')[1]);
    }

    // ОТЗЫВЫ
    document.querySelectorAll('#star-input i').forEach(s => {
        s.onclick = () => {
            rating = s.dataset.v;
            document.querySelectorAll('#star-input i').forEach(x => {
                x.style.color = x.dataset.v <= rating ? '#ffd700' : '#444';
            });
        }
    });

    function sendReview() {
        const text = document.getElementById('rev-msg').value;
        if(!text) return;
        const r = { id: Date.now(), fn: user.fn, stars: rating, text };
        reviews.unshift(r);
        localStorage.setItem('nn_revs_v5', JSON.stringify(reviews));
        tg.sendData(JSON.stringify({event: 'new_review', payload: r}));
        document.getElementById('rev-msg').value = '';
        renderReviews();
    }

    function renderReviews() {
        const box = document.getElementById('reviews-list'); box.innerHTML = '';
        reviews.forEach(r => {
            box.innerHTML += `<div class="glass"><b>${r.fn}</b> ${'⭐'.repeat(r.stars)}<p style="margin:5px 0 0; opacity:0.8">${r.text}</p></div>`;
        });
    }

    // АДМИНКА
    function renderAdmin() {
        const bBox = document.getElementById('admin-books'); bBox.innerHTML = '<h4>ВСЕ ЗАПИСИ:</h4>';
        bookings.forEach(b => {
            bBox.innerHTML += `<div class="glass" style="font-size:12px">${b.day}.03 | ${b.time} | ${b.fn}<br>Тел: ${b.ph}<br>
            <button onclick="adminCancel('${b.id}')" style="background:red; color:white; border:none; padding:5px; margin-top:5px; border-radius:5px;">Удалить запись</button></div>`;
        });

        const rBox = document.getElementById('admin-revs'); rBox.innerHTML = '<h4>ОТЗЫВЫ:</h4>';
        reviews.forEach(r => {
            rBox.innerHTML += `<div class="glass" style="font-size:12px">${r.fn}: ${r.text}<br>
            <button onclick="adminDelRev('${r.id}')" style="background:#555; color:white; border:none; padding:5px; margin-top:5px; border-radius:5px;">Удалить отзыв</button></div>`;
        });
    }

    window.adminCancel = (id) => {
        const b = bookings.find(x => x.id == id);
        bookings = bookings.filter(x => x.id != id);
        localStorage.setItem('nn_books_v5', JSON.stringify(bookings));
        tg.sendData(JSON.stringify({event: 'cancel_booking', payload: b}));
        renderAdmin();
    };

    window.adminDelRev = (id) => {
        const r = reviews.find(x => x.id == id);
        reviews = reviews.filter(x => x.id != id);
        localStorage.setItem('nn_revs_v5', JSON.stringify(reviews));
        tg.sendData(JSON.stringify({event: 'delete_review', payload: r}));
        renderAdmin();
    };
</script>
</body>
</html>
