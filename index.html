<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anastasia Nails Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #d4a373; --pink: #f4d3d9; --bg: #fffafb; --text: #4a4a4a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* Регистрация */
        .reg-form { text-align: center; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--pink); border-radius: 12px; outline: none; box-sizing: border-box; }
        .btn-reg { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Календарь */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-title { font-size: 18px; font-weight: 600; color: var(--accent); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .day { padding: 12px 0; border-radius: 12px; cursor: pointer; background: white; }
        .day.disabled { opacity: 0.15; cursor: not-allowed; }
        .day.selected { background: var(--accent) !important; color: white; }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .time-slot { padding: 12px; background: white; border: 1px solid var(--pink); border-radius: 12px; text-align: center; cursor: pointer; }
        .time-slot.selected { background: var(--accent); color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div id="regPage" class="page active">
        <div class="reg-form">
            <h2 style="color: var(--accent)">Регистрация</h2>
            <p>Представьтесь, чтобы продолжить</p>
            <input type="text" id="userName" placeholder="Ваше имя">
            <p style="font-size: 12px; opacity: 0.6">Номер телефона будет запрошен автоматически при подтверждении записи</p>
            <button class="btn-reg" onclick="goToBooking()">Далее</button>
        </div>
    </div>

    <div id="bookingPage" class="page">
        <div class="cal-header">
            <button onclick="changeMonth(-1)">‹</button>
            <div class="month-title" id="monthDisplay"></div>
            <button onclick="changeMonth(1)">›</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        
        <div id="timeSection" style="margin-top: 20px; display: none;">
            <div class="time-grid" id="timeGrid"></div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let userData = { name: '', date: null, time: null };
    let currentMonth = new Date();

    function goToBooking() {
        const name = document.getElementById('userName').value;
        if (name.length < 2) return alert("Введите имя");
        userData.name = name;
        document.getElementById('regPage').classList.remove('active');
        document.getElementById('bookingPage').classList.add('active');
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const display = document.getElementById('monthDisplay');
        grid.innerHTML = '';
        display.innerText = currentMonth.toLocaleString('ru', { month: 'long', year: 'numeric' });

        const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);

        for(let d = 1; d <= daysInMonth; d++) {
            const date = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), d);
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = d;
            if (date < today) el.classList.add('disabled');
            else el.onclick = () => {
                document.querySelectorAll('.day').forEach(i => i.classList.remove('selected'));
                el.classList.add('selected');
                userData.date = date.toISOString().split('T')[0];
                document.getElementById('timeSection').style.display = 'block';
                renderTime();
            };
            grid.appendChild(el);
        }
    }

    function renderTime() {
        const grid = document.getElementById('timeGrid');
        grid.innerHTML = '';
        ["10:00", "12:00", "14:00", "16:00", "18:00"].forEach(t => {
            const slot = document.createElement('div');
            slot.className = 'time-slot';
            slot.innerText = t;
            slot.onclick = () => {
                userData.time = t;
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
                tg.MainButton.setText(`Записаться на ${userData.date} в ${t}`);
                tg.MainButton.show();
            };
            grid.appendChild(slot);
        });
    }

    function changeMonth(dir) {
        currentMonth.setMonth(currentMonth.getMonth() + dir);
        renderCalendar();
    }

    tg.MainButton.onClick(() => {
        tg.sendData(JSON.stringify(userData));
    });
</script>
</body>
</html>
